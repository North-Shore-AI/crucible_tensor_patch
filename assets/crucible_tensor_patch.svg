<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <!-- Background and glowing gradients -->
    <linearGradient id="cyberGreen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00FF87" />
      <stop offset="100%" stop-color="#60EFFF" />
    </linearGradient>
    <linearGradient id="patchGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00FF87" stop-opacity="0.9" />
      <stop offset="100%" stop-color="#60EFFF" stop-opacity="0.5" />
    </linearGradient>
    <linearGradient id="gridLinesGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00FF87" stop-opacity="0.1" />
      <stop offset="100%" stop-color="#60EFFF" stop-opacity="0.3" />
    </linearGradient>
    
    <!-- Neon glow filter -->
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Hexagon Background and Border -->
  <polygon points="100,6 181,53 181,147 100,194 19,147 19,53" 
           fill="#0F1115" fill-opacity="0.9" 
           stroke="url(#cyberGreen)" stroke-width="5" stroke-linejoin="round"
           filter="url(#neonGlow)" />
           
  <!-- Isometric Grid and Patching Operation -->
  <g transform="translate(100, 110) scale(0.9)">
    
    <!-- Bottom Grid representing Tensor Matrix -->
    <g transform="translate(0, 20)">
      <!-- Isometric surface lines -->
      <path d="M -50,-10 L 10,25 M -30,-20 L 30,15 M -10,-30 L 50,5" stroke="url(#gridLinesGrad)" stroke-width="1.5" />
      <path d="M 50,-10 L -10,25 M 30,-20 L -30,15 M 10,-30 L -50,5" stroke="url(#gridLinesGrad)" stroke-width="1.5" />
      
      <!-- Nodes on bottom grid -->
      <circle cx="-40" cy="5" r="2.5" fill="#60EFFF" fill-opacity="0.5" />
      <circle cx="-20" cy="-5" r="2.5" fill="#60EFFF" fill-opacity="0.5" />
      <circle cx="0" cy="-15" r="2.5" fill="#60EFFF" fill-opacity="0.5" />
      <circle cx="20" cy="-25" r="2.5" fill="#60EFFF" fill-opacity="0.5" />
      
      <circle cx="-20" cy="15" r="2.5" fill="#60EFFF" fill-opacity="0.5" />
      <!-- Target position in grid (empty space/dotted outline) -->
      <polygon points="0,5 20,-5 0,-15 -20,-5" fill="none" stroke="#00FF87" stroke-width="1.5" stroke-dasharray="2,2" filter="url(#neonGlow)" />
      <circle cx="20" cy="-5" r="2.5" fill="#60EFFF" fill-opacity="0.5" />
      
      <circle cx="0" cy="25" r="2.5" fill="#60EFFF" fill-opacity="0.5" />
      <circle cx="20" cy="15" r="2.5" fill="#60EFFF" fill-opacity="0.5" />
      <circle cx="40" cy="5" r="2.5" fill="#60EFFF" fill-opacity="0.5" />
    </g>
    
    <!-- Alignment / Insertion Dotted Lines -->
    <line x1="-20" y1="-35" x2="-20" y2="15" stroke="#00FF87" stroke-opacity="0.4" stroke-width="1" stroke-dasharray="2,2" />
    <line x1="20" y1="-35" x2="20" y2="15" stroke="#00FF87" stroke-opacity="0.4" stroke-width="1" stroke-dasharray="2,2" />
    <line x1="0" y1="-45" x2="0" y2="5" stroke="#00FF87" stroke-opacity="0.6" stroke-width="1" stroke-dasharray="2,2" />
    <line x1="0" y1="-25" x2="0" y2="25" stroke="#00FF87" stroke-opacity="0.6" stroke-width="1" stroke-dasharray="2,2" />

    <!-- The Patch Block being lowered (Upper Position) -->
    <g transform="translate(0, -30)">
      <!-- Beautiful Isometric 3D-like Patch Block -->
      <!-- Top Face -->
      <polygon points="0,-15 20,-5 0,5 -20,-5" fill="url(#patchGrad)" stroke="#00FF87" stroke-width="1.5" filter="url(#neonGlow)" />
      <!-- Left Face -->
      <polygon points="-20,-5 0,5 0,15 -20,5" fill="#00FF87" fill-opacity="0.4" stroke="#00FF87" stroke-width="1.5" />
      <!-- Right Face -->
      <polygon points="0,5 20,-5 20,5 0,15" fill="#60EFFF" fill-opacity="0.4" stroke="#60EFFF" stroke-width="1.5" />
      
      <!-- Suture/Precision indicator inside patch -->
      <path d="M -8,-2 L 8,-2" stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round" />
      <path d="M 0,-6 L 0,2" stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round" />
    </g>

    <!-- Precise Cursor target at patching site -->
    <circle cx="0" cy="20" r="1.5" fill="#00FF87" filter="url(#neonGlow)" />
    <!-- Glowing chevron indicating downward patch application -->
    <path d="M -8,-5 L 0,0 L 8,-5" stroke="#00FF87" stroke-width="2" fill="none" stroke-linecap="round" filter="url(#neonGlow)" />
  </g>
</svg>
